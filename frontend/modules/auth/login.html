<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <base href="../../">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
  <meta name="description" content="Construction Cost Control & Performance Monitoring System">
  <meta name="author" content="Mohammed Salah">
  <title>Login | Construction Cost Control System</title>
  <meta name="theme-color" content="#ffffff">
  <!-- Main styles for this application-->
  <link href="css/style.css" rel="stylesheet">
  <link href="css/app.css" rel="stylesheet">
  <script src="js/color-modes.js"></script>
</head>
<body>
  <div class="bg-body-tertiary min-vh-100 d-flex flex-row align-items-center">
    <div class="container" style="max-width: 32rem">
      <div class="d-flex flex-column gap-4">
        <div class="text-center">
          <h2 data-i18n="app.name">Cost Control System</h2>
          <p class="text-body-secondary mb-0" data-i18n="app.subtitle">Construction Cost Control & Performance
            Monitoring</p>
        </div>
        <div class="card p-4">
          <div class="card-body d-flex flex-column gap-4">
            <h2 class="h5 text-center" data-i18n="auth.login.title">Login to your account</h2>
            <form id="loginForm" class="row gap-3" novalidate>
              <div>
                <label class="form-label" for="email" data-i18n="auth.login.email">Email address</label>
                <input class="form-control" id="email" name="email" type="email" placeholder="name@company.com"
                  autocomplete="email">
              </div>
              <div>
                <div class="d-flex justify-content-between">
                  <label class="form-label" for="password" data-i18n="auth.login.password">Password</label>
                </div>
                <div class="input-group">
                  <input class="form-control" id="password" name="password" type="password"
                    placeholder="Enter your password" data-i18n-placeholder="auth.login.passwordPlaceholder"
                    autocomplete="current-password">
                  <span class="input-group-text">
                    <button id="togglePasswordButton"
                      class="bg-transparent border-0 p-0 link-secondary d-flex align-items-center justify-content-center"
                      type="button" data-coreui-toggle="tooltip" aria-label="Show password"
                      data-coreui-original-title="Show password">
                      <svg id="passwordVisibleIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" />
                        <circle cx="12" cy="12" r="3" />
                      </svg>
                      <svg id="passwordHiddenIcon" class="d-none" xmlns="http://www.w3.org/2000/svg" width="20"
                        height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a21.77 21.77 0 0 1 5.06-5.94" />
                        <path d="M9.9 4.24A10.94 10.94 0 0 1 12 5c7 0 11 7 11 7a21.77 21.77 0 0 1-4.16 5.19" />
                        <line x1="1" y1="1" x2="23" y2="23" />
                        <path d="M9.53 9.53A3 3 0 0 0 14.47 14.47" />
                      </svg>
                    </button>
                  </span>
                </div>
              </div>
              <div>
                <label class="form-check">
                  <input class="form-check-input" type="checkbox" id="rememberMe" name="rememberMe">
                  <span class="form-check-label" data-i18n="auth.login.rememberMe">Remember me</span>
                </label>
              </div>
              <div>
                <button id="btnLogin" class="btn btn-primary w-100" type="submit">
                  <span id="btnLoginSpinner" class="spinner-border spinner-border-sm me-2 d-none" aria-hidden="true">
                  </span>
                  <span data-i18n="auth.login.signIn">
                    Sign in
                  </span>
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3"></div>
  <!-- CoreUI and necessary plugins-->
  <script src="vendors/@coreui/coreui/js/coreui.bundle.min.js"></script>
  <script>
    const tooltipTriggerList = document.querySelectorAll('[data-coreui-toggle="tooltip"]');
    const tooltipList = [...tooltipTriggerList].map((tooltipTriggerEl) => new coreui.Tooltip(tooltipTriggerEl));
  </script>
  <script type="module">
  import { initializeLocalization } from "../../shared/localization/i18n.js";
  initializeLocalization();
  </script>
  <script type="module" src="modules/auth/auth.js"></script>
</body>
</html>
