<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <base href="../../">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <meta name="description" content="Construction Cost Control & Performance Monitoring System">
    <meta name="author" content="Mohammed Salah">
    <title>Projects | Construction Cost Control System</title>
    <meta name="theme-color" content="#ffffff">
    <!-- Vendor styles-->
    <link rel="stylesheet" href="vendors/simplebar/css/simplebar.css">
    <link rel="stylesheet" href="css/vendors/simplebar.css">
    <link rel="stylesheet" href="vendors/@coreui/icons/css/free.min.css">
    <!-- Main styles for this application-->
    <link href="css/style.css" rel="stylesheet">
    <link href="css/app.css" rel="stylesheet">
    <script src="js/color-modes.js"></script>
  </head>
  <body>
    <div id="sidebarContainer"></div>

    <div class="wrapper d-flex flex-column min-vh-100">
      <header class="header header-sticky p-0 mb-4">
        <div class="container-fluid border-bottom px-4">

          <button class="header-toggler" type="button" onclick="coreui.Sidebar.getInstance(document.querySelector('#sidebar')).toggle()" style="margin-inline-start: -14px">
            <svg class="icon icon-lg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
              <path fill="var(--ci-primary-color, currentcolor)" d="M80 96h352v32H80zm0 144h352v32H80zm0 144h352v32H80z" class="ci-primary" />
            </svg>
          </button>

          <ul class="header-nav">
 
            <li class="nav-item dropdown">
              <button class="btn btn-link nav-link py-2 px-2 d-flex align-items-center"
                type="button"
                aria-expanded="false"
                data-coreui-toggle="dropdown">
                <i class="icon icon-lg cil-contrast theme-icon-active"></i>
              </button>

              <ul class="dropdown-menu dropdown-menu-end" style="--cui-dropdown-min-width: 8rem">
                <li>
                  <button class="dropdown-item d-flex align-items-center" type="button" data-coreui-theme-value="light">
                    <i class="icon icon-lg me-3 cil-sun"></i>
                    <span data-i18n="layout.theme.light">Light</span>
                  </button>
                </li>
                <li>
                  <button class="dropdown-item d-flex align-items-center" type="button" data-coreui-theme-value="dark">
                    <i class="icon icon-lg me-3 cil-moon"></i>
                    <span data-i18n="layout.theme.dark">Dark</span>
                  </button>
                </li>
                <li>
                  <button class="dropdown-item d-flex align-items-center active" type="button" data-coreui-theme-value="auto">
                    <i class="icon icon-lg me-3 cil-contrast"></i>
                    <span data-i18n="layout.theme.auto">Auto</span>
                  </button>
                </li>
              </ul>
            </li>

            <li class="nav-item dropdown">

              <button
                class="btn btn-link nav-link py-2 px-2 d-flex align-items-center"
                type="button"
                data-coreui-toggle="dropdown"
                aria-expanded="false">

                <svg width="20" height="20" viewBox="0 -960 960 960" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M323-111.5Q250-143 196-197t-85-127.5Q80-398 80-482t31-156.5Q142-711 196-765t127-84.5Q396-880 480-880t157 30.5Q710-819 764-765t85 126.5Q880-566 880-482t-31 157.5Q818-251 764-197t-127 85.5Q564-80 480-80t-157-31.5ZM480-138q35-36 58.5-82.5T577-331H384q14 60 37.5 108t58.5 85Zm-85-12q-25-38-43-82t-30-99H172q38 71 88 111.5T395-150Zm171-1q72-23 129.5-69T788-331H639q-13 54-30.5 98T566-151ZM152-391h159q-3-27-3.5-48.5T307-482q0-25 1-44.5t4-43.5H152q-7 24-9.5 43t-2.5 45q0 26 2.5 46.5T152-391Zm221 0h215q4-31 5-50.5t1-40.5q0-20-1-38.5t-5-49.5H373q-4 31-5 49.5t-1 38.5q0 21 1 40.5t5 50.5Zm275 0h160q7-24 9.5-44.5T820-482q0-26-2.5-45t-9.5-43H649q3 35 4 53.5t1 34.5q0 22-1.5 41.5T648-391Zm-10-239h150q-33-69-90.5-115T565-810q25 37 42.5 80T638-630Zm-254 0h194q-11-53-37-102.5T480-820q-32 27-54 71t-42 119Zm-212 0h151q11-54 28-96.5t43-82.5q-75 19-131 64t-91 115Z" fill="currentColor"></path></svg>
              </button>

              <ul class="dropdown-menu dropdown-menu-end">
                <li>
                  <button id="languageEnglish" class="dropdown-item active" type="button" data-language="en">🇺🇸 English</button>
                </li>
                <li>
                  <button id="languageArabic" class="dropdown-item" type="button" data-language="ar">العربية 🇸🇦</button>
                </li>
              </ul>

            </li>

            <li class="nav-item py-1">
              <div class="vr h-100 mx-2 text-body text-opacity-75"></div>
            </li>

            <li class="nav-item dropdown">
              <a class="nav-link py-0 pe-0 d-flex align-items-center" data-coreui-toggle="dropdown" href="#" role="button" aria-haspopup="true" aria-expanded="false">
                  <div class="avatar avatar-md"><img id="currentUserAvatar" class="avatar-img" src="assets/images/avatars/default.jpg" alt="User"></div>
                  <svg class="ms-2 text-body-secondary "  xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"></polyline>
                  </svg>
              </a>

              <div class="dropdown-menu dropdown-menu-end pt-0">
                  <div class="px-3 py-2">
                      <div id="currentUserName" class="fw-bold fs-6 text-nowrap">
                          User
                      </div>
                      <div id="currentUserRole" class="small text-body-secondary">
                          Administrator
                      </div>
                  </div>

                  <div class="dropdown-divider"></div>

                  <a class="dropdown-item" href="#">
                    <i class="icon me-2 cil-user"></i>
                    <span data-i18n="layout.userMenu.profile">Profile</span>                      
                  </a>

                  <a class="dropdown-item" href="#">
                    <i class="icon me-2 cil-settings"></i>
                    <span data-i18n="layout.userMenu.settings">Settings</span>                      
                  </a>

                  <div class="dropdown-divider"></div>

                  <a id="logoutButton" class="dropdown-item" href="#">
                    <i class="icon me-2 cil-account-logout"></i>
                    <span data-i18n="layout.userMenu.logout">Logout</span>
                  </a>
              </div>
            </li>
          </ul>
        </div>

        <div class="container-fluid px-4">
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb my-0">
                <li class="breadcrumb-item active" aria-current="page">
                  <span data-i18n="projects.page.title">Projects</span>
                </li>
            </ol>
          </nav>
        </div>

      </header>
      <div class="body flex-grow-1">
        <div class="container-lg px-4">
          <!-- Page Content -->
          <div class="row">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center mb-4">
 
                    <div>
                        <h2 class="mb-1" data-i18n="projects.page.title">Projects</h2>
                        <p class="text-body-secondary mb-0" data-i18n="projects.page.description">
                          projects and related information.
                        </p>
                    </div>

                    <button
                        id="addProjectButton" type="button" class="btn btn-primary">
                        <i class="cil-plus me-2"></i>
                        <span data-i18n="projects.page.addButton">Add Project</span>
                    </button>

                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                            <tr>
                              <th data-i18n="projects.table.id">ID</th>
                              <th data-i18n="projects.table.name">Name</th>
                              <th data-i18n="projects.table.startDate">Start Date</th>
                              <th data-i18n="projects.table.endDate">End Date</th>
                              <th data-i18n="projects.table.actions">Actions</th>
                            </tr>
                        </thead>

                        <tbody id="projectsTableBody">
                        </tbody>

                    </table>
                </div>
            </div>
        </div>
           
        </div>
      </div>

      <footer class="footer px-4">
        <div>Construction Cost Control System &copy; 2026</div>
      </footer>

    </div>

    <!-- Project Modal -->

    <div class="modal fade" id="projectModal" tabindex="-1" aria-labelledby="projectModalTitle" aria-hidden="true">

    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="projectModalTitle" data-i18n="projects.modal.addTitle">Add Project</h5>
                <button type="button" class="btn-close" data-coreui-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="projectForm">
                    <input type="hidden" id="projectId">
                    <div class="mb-3">
                        <label for="projectName" class="form-label" data-i18n="projects.modal.projectName">Project Name</label>
                        <input type="text" class="form-control" id="projectName" maxlength="150" required>
                    </div>

                    <div class="mb-3"> <label for="projectDescription" class="form-label" data-i18n="projects.modal.description">Description</label>
                        <textarea class="form-control" id="projectDescription" rows="3" maxlength="500"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="projectStartDate" class="form-label" data-i18n="projects.modal.startDate">Start Date</label>
                        <input type="date" class="form-control" id="projectStartDate" required>
                    </div>

                    <div class="mb-3">
                        <label for="projectEndDate" class="form-label"  data-i18n="projects.modal.endDate">End Date</label>
                        <input type="date" class="form-control" id="projectEndDate">
                    </div>
                </form>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-coreui-dismiss="modal" data-i18n="projects.modal.cancel">Cancel</button>

                <button type="submit" class="btn btn-primary" form="projectForm" id="saveProjectButton">
                  <span id="saveProjectSpinner" class="spinner-border spinner-border-sm me-2 d-none" aria-hidden="true"></span>
                  <span id="saveProjectButtonText" data-i18n="projects.modal.create">Create</span>
                </button>
            </div>
        </div>
    </div>

    </div>
    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3"></div>
    <!-- CoreUI and necessary plugins-->
    <script src="vendors/@coreui/coreui/js/coreui.bundle.min.js"></script>
    <script src="vendors/simplebar/js/simplebar.min.js"></script>
    <script>
      const header = document.querySelector("header.header");

      document.addEventListener("scroll", () => {
        if (header) {
          header.classList.toggle("shadow-sm", document.documentElement.scrollTop > 0);
        }
      });
    </script>
    <script type="module" src="modules/projects/projects.js"></script>
  </body>
</html>
